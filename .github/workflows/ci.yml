name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Dummy values — el build de Next no se conecta, pero módulos se instancian
      # al recolectar páginas y necesitan las vars presentes.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=gestor"
      NEXTAUTH_SECRET: "ci-secret"
      NEXTAUTH_URL: "http://localhost:3010"
      NEXTAUTH_TRUST_HOST: "true"
      REDIS_URL: "redis://localhost:6379"
      DEPLOY_ENV: "ci"
      DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}
      # Stubs para clientes instanciados a top-level
      OPENAI_API_KEY: "sk-ci-dummy"
      ANTHROPIC_API_KEY: "sk-ant-ci-dummy"
      EVOLUTION_API_URL: "http://localhost:8080"
      EVOLUTION_API_KEY: "ci-dummy"
      MASTER_API_SECRET: "ci-dummy"
      UPTRES_SECRET: "ci-dummy-32-bytes-padding-xxxxx"
      CRON_SECRET: "ci-dummy"
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_EMAIL: "mailto:ci@tuagentx.com"
      R2_ACCOUNT_ID: "ci"
      R2_ACCESS_KEY_ID: "ci"
      R2_SECRET_ACCESS_KEY: "ci"
      R2_BUCKET: "ci"
      R2_ENDPOINT: "https://ci.r2.cloudflarestorage.com"
      TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SECRET_KEY_GESTOR: "ci"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY_GESTOR: "ci"
      TZ: "America/Bogota"

    steps:
      - uses: actions/checkout@v4
        with:
          # Necesario para que gen-version.js lea commit/branch correctamente
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Verify version artifact
        run: |
          test -f lib/version.ts || { echo "lib/version.ts no generado"; exit 1; }
          grep -q "fullCommit" lib/version.ts || { echo "version.ts inválido"; exit 1; }
          echo "✓ lib/version.ts generado correctamente"
          head -5 lib/version.ts

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Lint (informativo, no bloquea)
        run: npm run lint
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Prisma generate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=gestor"
        run: npx prisma generate
      - name: Run tests
        run: npm test
