name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Dummy values — el build de Next no se conecta, solo necesita las vars seteadas
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=gestor"
      NEXTAUTH_SECRET: "ci-secret"
      NEXTAUTH_URL: "http://localhost:3010"
      REDIS_URL: "redis://localhost:6379"
      DEPLOY_ENV: "ci"
      DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Necesario para que gen-version.js lea commit/branch correctamente
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Verify version artifact
        run: |
          test -f lib/version.ts || { echo "lib/version.ts no generado"; exit 1; }
          grep -q "fullCommit" lib/version.ts || { echo "version.ts inválido"; exit 1; }
          echo "✓ lib/version.ts generado correctamente"
          head -5 lib/version.ts

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # warnings sin bloquear PR hasta que el código esté limpio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
