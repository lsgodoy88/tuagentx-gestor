name: Deploy Gestor

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-gestor
  cancel-in-progress: false

jobs:
  # ── JOB 1: Tests + validación ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=gestor"
      NEXTAUTH_SECRET: "ci-secret"
      NEXTAUTH_URL: "http://localhost:3010"
      NEXTAUTH_TRUST_HOST: "true"
      REDIS_URL: "redis://localhost:6379"
      DEPLOY_ENV: "production"
      DEPLOY_BRANCH: "main"
      OPENAI_API_KEY: "sk-ci-dummy"
      ANTHROPIC_API_KEY: "sk-ant-ci-dummy"
      EVOLUTION_API_URL: "http://localhost:8080"
      EVOLUTION_API_KEY: "ci-dummy"
      MASTER_API_SECRET: "ci-dummy"
      UPTRES_SECRET: "ci-dummy-32-bytes-padding-xxxxx"
      CRON_SECRET: "ci-dummy"
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_EMAIL: "mailto:ci@tuagentx.com"
      R2_ACCOUNT_ID: "ci"
      R2_ACCESS_KEY_ID: "ci"
      R2_SECRET_ACCESS_KEY: "ci"
      R2_BUCKET: "ci"
      R2_ENDPOINT: "https://ci.r2.cloudflarestorage.com"
      TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SECRET_KEY_GESTOR: "ci"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SITE_KEY_CRM: "ci"
      TURNSTILE_SECRET_KEY_CRM: "ci"
      TURNSTILE_SITE_KEY_MASTER: "ci"
      TURNSTILE_SECRET_KEY_MASTER: "ci"
      TZ: "America/Bogota"

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prisma generate + validate
        run: npx prisma generate && npx prisma validate

      - name: Tests
        run: npm test

  # ── JOB 2: Build en runner de GitHub ─────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=gestor"
      NEXTAUTH_SECRET: "ci-secret"
      NEXTAUTH_URL: "https://gestor.tuagentx.com"
      NEXTAUTH_TRUST_HOST: "true"
      REDIS_URL: "redis://localhost:6379"
      DEPLOY_ENV: "production"
      DEPLOY_BRANCH: "main"
      OPENAI_API_KEY: "sk-ci-dummy"
      ANTHROPIC_API_KEY: "sk-ant-ci-dummy"
      EVOLUTION_API_URL: "http://localhost:8080"
      EVOLUTION_API_KEY: "ci-dummy"
      MASTER_API_SECRET: "ci-dummy"
      UPTRES_SECRET: "ci-dummy-32-bytes-padding-xxxxx"
      CRON_SECRET: "ci-dummy"
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_EMAIL: "mailto:ci@tuagentx.com"
      R2_ACCOUNT_ID: "ci"
      R2_ACCESS_KEY_ID: "ci"
      R2_SECRET_ACCESS_KEY: "ci"
      R2_BUCKET: "ci"
      R2_ENDPOINT: "https://ci.r2.cloudflarestorage.com"
      TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SECRET_KEY_GESTOR: "ci"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SITE_KEY_CRM: "ci"
      TURNSTILE_SECRET_KEY_CRM: "ci"
      TURNSTILE_SITE_KEY_MASTER: "ci"
      TURNSTILE_SECRET_KEY_MASTER: "ci"
      TZ: "America/Bogota"

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Verify build
        run: |
          test -f .next/BUILD_ID || { echo "❌ BUILD_ID no existe"; exit 1; }
          MANIFESTS=$(find .next/server/app -name "*client-reference-manifest*" 2>/dev/null | wc -l)
          if [ "$MANIFESTS" -lt 50 ]; then
            echo "❌ Build incompleto: solo $MANIFESTS manifests"
            exit 1
          fi
          echo "✓ Build OK — $MANIFESTS manifests"

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next/
            !.next/cache
            !.next/trace
          retention-days: 1

  # ── JOB 3: Deploy al servidor ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download .next artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "167.88.39.242 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPU83nFu9fVUmhxMA6dQIFpGc1khRoS2chF6zYSAqWGn" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: rsync .next al servidor
        run: |
          rsync -az --delete \
            --exclude='cache' \
            --exclude='trace' \
            .next/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/srv/gestor/.next/

      - name: Deploy en servidor
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'REMOTE'
          set -e
          touch /tmp/gestor-deploying
          cd /srv/gestor

          echo "→ git pull"
          git pull --ff-only origin main

          # npm ci solo si cambió package-lock.json
          if git diff HEAD~1 HEAD --name-only 2>/dev/null | grep -q "package-lock.json"; then
            echo "→ npm ci (package-lock cambió)"
            npm ci --omit=dev --no-audit --no-fund
          fi

          # Migraciones solo si hay nuevas
          if git diff HEAD~1 HEAD --name-only 2>/dev/null | grep -q "prisma/migrations/"; then
            echo "→ prisma migrate deploy"
            npx prisma migrate deploy
          fi

          # Verificar que llegó el build
          test -f .next/BUILD_ID || { rm -f /tmp/gestor-deploying; echo "❌ BUILD_ID no existe en servidor"; exit 1; }
          echo "✓ .next recibido — BUILD_ID: $(cat .next/BUILD_ID)"

          echo "→ restart gestor"
          pm2 delete gestor 2>/dev/null || true
          pm2 start /srv/gestor/ecosystem.config.js
          sleep 12

          HTTP=$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:3010/api/health || echo "000")
          if [ "$HTTP" != "200" ]; then
            rm -f /tmp/gestor-deploying
            echo "❌ Health check falló: HTTP $HTTP"
            exit 1
          fi

          pm2 save --force
          sleep 3
          rm -f /tmp/gestor-deploying

          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/6ca0d1f90e4dc2357040df9e48764a53/purge_cache" \
            -H "Authorization: Bearer $CF_PURGE_TOKEN" \
            -H "Content-Type: application/json" --data '{"purge_everything":true}' > /dev/null

          CRON_VAL=$(grep CRON_SECRET /srv/gestor/.env | cut -d= -f2 | tr -d '"')
          curl -s -X POST "http://localhost:3010/api/cache/warmup" \
            -H "x-cron-secret: $CRON_VAL" \
            -H "Content-Type: application/json" > /dev/null 2>&1 || true

          VER=$(curl -fsS http://localhost:3010/api/version 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['commit'])" 2>/dev/null || echo "?")
          echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"evento\":\"deploy\",\"commit\":\"$VER\",\"ok\":true,\"via\":\"github_actions\"}" >> /home/luis/logs/guardian-testigo.jsonl

          echo "✅ Deploy OK — commit $VER"
          REMOTE
        env:
          CF_PURGE_TOKEN: ${{ secrets.CF_PURGE_TOKEN }}
