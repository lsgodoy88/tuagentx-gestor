name: Deploy Gestor

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-gestor
  cancel-in-progress: false

jobs:
  # ── JOB 1: Tests ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=gestor"
      NEXTAUTH_SECRET: "ci-secret"
      NEXTAUTH_URL: "http://localhost:3010"
      NEXTAUTH_TRUST_HOST: "true"
      REDIS_URL: "redis://localhost:6379"
      DEPLOY_ENV: "production"
      DEPLOY_BRANCH: "main"
      OPENAI_API_KEY: "sk-ci-dummy"
      ANTHROPIC_API_KEY: "sk-ant-ci-dummy"
      EVOLUTION_API_URL: "http://localhost:8080"
      EVOLUTION_API_KEY: "ci-dummy"
      MASTER_API_SECRET: "ci-dummy"
      UPTRES_SECRET: "ci-dummy-32-bytes-padding-xxxxx"
      CRON_SECRET: "ci-dummy"
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_EMAIL: "mailto:ci@tuagentx.com"
      R2_ACCOUNT_ID: "ci"
      R2_ACCESS_KEY_ID: "ci"
      R2_SECRET_ACCESS_KEY: "ci"
      R2_BUCKET: "ci"
      R2_ENDPOINT: "https://ci.r2.cloudflarestorage.com"
      TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SECRET_KEY_GESTOR: "ci"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SITE_KEY_CRM: "ci"
      TURNSTILE_SECRET_KEY_CRM: "ci"
      TURNSTILE_SITE_KEY_MASTER: "ci"
      TURNSTILE_SECRET_KEY_MASTER: "ci"
      TZ: "America/Bogota"
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Prisma generate + validate
        run: npx prisma generate && npx prisma validate
      - name: Tests
        run: npm test

  # ── JOB 2: Build + subir .next/ a R2 + trigger webhook ───────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=gestor"
      NEXTAUTH_SECRET: "ci-secret"
      NEXTAUTH_URL: "https://gestor.tuagentx.com"
      NEXTAUTH_TRUST_HOST: "true"
      REDIS_URL: "redis://localhost:6379"
      DEPLOY_ENV: "production"
      DEPLOY_BRANCH: "main"
      OPENAI_API_KEY: "sk-ci-dummy"
      ANTHROPIC_API_KEY: "sk-ant-ci-dummy"
      EVOLUTION_API_URL: "http://localhost:8080"
      EVOLUTION_API_KEY: "ci-dummy"
      MASTER_API_SECRET: "ci-dummy"
      UPTRES_SECRET: "ci-dummy-32-bytes-padding-xxxxx"
      CRON_SECRET: "ci-dummy"
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_EMAIL: "mailto:ci@tuagentx.com"
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SECRET_KEY_GESTOR: "ci"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY_GESTOR: "ci"
      TURNSTILE_SITE_KEY_CRM: "ci"
      TURNSTILE_SECRET_KEY_CRM: "ci"
      TURNSTILE_SITE_KEY_MASTER: "ci"
      TURNSTILE_SECRET_KEY_MASTER: "ci"
      TZ: "America/Bogota"
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Prisma generate
        run: npx prisma generate
      - name: Build
        run: npm run build
      - name: Verify build
        run: |
          test -f .next/BUILD_ID || { echo "❌ BUILD_ID no existe"; exit 1; }
          MANIFESTS=$(find .next/server/app -name "*client-reference-manifest*" 2>/dev/null | wc -l)
          [ "$MANIFESTS" -lt 50 ] && { echo "❌ Build incompleto: $MANIFESTS manifests"; exit 1; }
          echo "✓ Build OK — $MANIFESTS manifests, BUILD_ID: $(cat .next/BUILD_ID)"

      - name: Empaquetar .next/ y subir a R2
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_KEY="deploys/gestor-${COMMIT}.tar.gz"
          echo "BUILD_KEY=$BUILD_KEY" >> $GITHUB_ENV
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV

          # Empaquetar sin cache ni trace
          tar -czf /tmp/next-build.tar.gz \
            --exclude='.next/cache' \
            --exclude='.next/trace' \
            .next/

          # Subir a R2 — pasar vars explícitamente al script Python
          pip install boto3 -q
          BUILD_KEY="$BUILD_KEY" python3 - << 'PYEOF'
import boto3, os
s3 = boto3.client(
    's3',
    endpoint_url=os.environ['R2_ENDPOINT'],
    aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
    aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
    region_name='auto',
)
build_key = os.environ['BUILD_KEY']
s3.upload_file('/tmp/next-build.tar.gz', os.environ['R2_BUCKET'], build_key)
print(f"✓ Subido a R2: {build_key}")
PYEOF

      - name: Trigger webhook en servidor
        run: |
          PAYLOAD="{\"commit\":\"$COMMIT\",\"buildKey\":\"$BUILD_KEY\"}"
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')"

          HTTP=$(curl -s -o /tmp/webhook-resp.txt -w '%{http_code}' \
            -X POST "https://gestor.tuagentx.com/api/deploy/webhook" \
            -H "Content-Type: application/json" \
            -H "x-deploy-signature: $SIGNATURE" \
            -d "$PAYLOAD")

          cat /tmp/webhook-resp.txt
          echo ""

          if [ "$HTTP" != "202" ]; then
            echo "❌ Webhook falló: HTTP $HTTP"
            exit 1
          fi
          echo "✓ Webhook aceptado — deploy corriendo en servidor"
